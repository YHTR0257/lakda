name: lakda

services:
  lakda-database:
    image: neo4j:${NEO4J_VERSION:-5}
    container_name: ${NEO4J_CONTAINER_NAME:-lakda-database}
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=${NEO4J_PLUGINS:-["apoc"]}
      - NEO4J_dbms_security_procedures_unrestricted=${NEO4J_UNRESTRICTED_PROCEDURES:-apoc.*}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - lakda-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-password} 'RETURN 1'",
        ]
      interval: ${DB_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${DB_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${DB_HEALTHCHECK_RETRIES:-5}
    deploy:
      resources:
        limits:
          cpus: "${NEO4J_CPUS_LIMIT:-2}"
          memory: "${NEO4J_MEMORY_LIMIT:-4G}"
    restart: unless-stopped

  backend:
    build:
      context: ../../
      dockerfile: envs/docker/backend.Dockerfile
      target: ${BACKEND_BUILD_TARGET:-production}
    container_name: ${BACKEND_CONTAINER_NAME:-lakda-backend}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - ../../.env
    environment:
      - NEO4J_URI_BOLT=${NEO4J_URI_BOLT:-bolt://lakda-database:7687}
      - NEO4J_URI_NEO4J=${NEO4J_URI_NEO4J:-neo4j://lakda-database:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - LOG_LEVEL=${LOG_LEVEL:-warning}
    depends_on:
      lakda-database:
        condition: service_healthy
    networks:
      - lakda-network
    command:
      [
        "uvicorn",
        "lakda.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--workers",
        "4",
      ]
    deploy:
      resources:
        limits:
          cpus: "${BACKEND_CPUS_LIMIT:-2}"
          memory: "${BACKEND_MEMORY_LIMIT:-1G}"
    restart: unless-stopped

  frontend:
    build:
      context: ../../
      dockerfile: envs/docker/frontend.Dockerfile
      target: ${FRONTEND_BUILD_TARGET:-production}
    container_name: ${FRONTEND_CONTAINER_NAME:-lakda-frontend}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/}
      - NEXT_PUBLIC_LOG_LEVEL=${NEXT_PUBLIC_LOG_LEVEL:-warning}
    env_file:
      - ../../.env
    networks:
      - lakda-network
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: "${FRONTEND_CPUS_LIMIT:-1}"
          memory: "${FRONTEND_MEMORY_LIMIT:-512M}"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:${OLLAMA_VERSION:-latest}
    container_name: ${OLLAMA_CONTAINER_NAME:-lakda-ollama}
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-0.0.0.0:11434}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - lakda-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${OLLAMA_GPU_COUNT:-all}
              capabilities: [gpu]
        limits:
          cpus: "${OLLAMA_CPUS_LIMIT:-4}"
          memory: "${OLLAMA_MEMORY_LIMIT:-16G}"
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  ollama_models:

networks:
  lakda-network:
    driver: bridge
