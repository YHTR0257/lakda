name: lakda

services:
  lakda-database:
    image: neo4j:${NEO4J_VERSION:-5}
    container_name: ${NEO4J_CONTAINER_NAME:-lakda-database}
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=${NEO4J_PLUGINS:-["apoc"]}
    volumes:
      - ../../data/neo4j:/data/
      - ../../logs/neo4j:/logs/
    networks:
      - lakda-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-password} 'RETURN 1'",
        ]
      interval: ${DB_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${DB_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${DB_HEALTHCHECK_RETRIES:-5}

  backend:
    build:
      context: ../../
      dockerfile: envs/docker/backend.Dockerfile
      target: ${BACKEND_BUILD_TARGET:-development}
    container_name: ${BACKEND_CONTAINER_NAME:-lakda-backend}
    env_file:
      - ../../.env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      lakda-database:
        condition: service_healthy
    networks:
      - lakda-network
    volumes:
      - ../../backend:/app
      - ../../data/documents:/app/data/documents
      - ../../logs/backend:/app/logs
      - /app/.venv
      - ../../.env:/app/.env
      - ../../scripts/backend:/app/scripts
    command:
      [
        "uvicorn",
        "lakda.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    deploy:
      resources:
        limits:
          cpus: "${BACKEND_CPUS_LIMIT:-1}"
          memory: "${BACKEND_MEMORY_LIMIT:-512M}"

  frontend:
    build:
      context: ../../
      dockerfile: envs/docker/frontend.Dockerfile
      target: ${FRONTEND_BUILD_TARGET:-development}
    container_name: ${FRONTEND_CONTAINER_NAME:-lakda-frontend}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/}
      - NEXT_PUBLIC_LOG_LEVEL=${NEXT_PUBLIC_LOG_LEVEL:-info}
      - npm_config_cache=/tmp/.npm
    env_file:
      - ../../.env
    networks:
      - lakda-network
    depends_on:
      - backend
    volumes:
      - ../../frontend:/app
      - ../../logs/frontend:/app/logs
      - /app/node_modules
      - /app/.next
    command: ["sh", "-c", "npm install && npm run dev"]
    deploy:
      resources:
        limits:
          cpus: "${FRONTEND_CPUS_LIMIT:-1}"
          memory: "${FRONTEND_MEMORY_LIMIT:-512M}"

  # Ollama: dev環境ではホストで実行（M1 Mac GPU活用のため）
  # host.docker.internal:11434 経由でアクセス
  # ホストでの起動: brew install ollama && ollama serve

volumes: {}

networks:
  lakda-network:
    driver: bridge
