services:
  lakda-database:
    image: neo4j:5
    container_name: lakda-database
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - lakda-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-password} 'RETURN 1'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../
      dockerfile: envs/docker/backend.Dockerfile
      target: development
    container_name: lakda-backend
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://lakda-database:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - OLLAMA_HOST=http://ollama:11434
      - LOG_LEVEL=INFO
    env_file:
      - ../../.env
    depends_on:
      lakda-database:
        condition: service_healthy
    networks:
      - lakda-network
    volumes:
      - ../../backend:/app
      - /app/.venv
    command:
      ["uvicorn", "lakda.main:app", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build:
      context: ../../
      dockerfile: envs/docker/frontend.Dockerfile
      target: development
    container_name: lakda-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - npm_config_cache=/tmp/.npm
    env_file:
      - ../../.env
    networks:
      - lakda-network
    depends_on:
      - backend
    volumes:
      - ../../frontend:/app
      - /app/node_modules
      - /app/.next
    command: ["sh", "-c", "npm install && npm run dev"]

  # ローカルLLM（オプション）
  ollama:
    image: ollama/ollama:latest
    container_name: lakda-ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - lakda-network

volumes:
  neo4j_data:
  neo4j_logs:
  ollama_models:

networks:
  lakda-network:
    driver: bridge
